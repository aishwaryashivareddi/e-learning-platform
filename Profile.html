<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile | E-Learning Platform</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <div class="brand"><i class="bi bi-mortarboard-fill"></i> LearnHub</div>
      <button class="hamburger" aria-label="Toggle menu"><i class="bi bi-list"></i></button>
      <nav class="main-nav">
        <ul>
          <li><a href="Dashboard.html" data-page="dashboard"><i class="bi bi-speedometer2"></i> Dashboard</a></li>
          <li><a href="Courses.html" data-page="courses"><i class="bi bi-book"></i> Courses</a></li>
          <li><a href="Quiz.html" data-page="quiz"><i class="bi bi-patch-question"></i> Quiz</a></li>
          <li><a href="Profile.html" data-page="profile"><i class="bi bi-person"></i> Profile</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <div class="breadcrumb-bar">
    <ol>
      <li><a href="Dashboard.html">Home</a></li>
      <li>Profile</li>
    </ol>
  </div>

  <main class="content">
    <h2 class="section-title">Learner Profile</h2>

    
    <div class="profile-card" id="profileCard"></div>

   
    <h2 class="section-title">Course Progress</h2>
    <ul class="completed-list" id="completedList"></ul>

  
    <h2 class="section-title" style="margin-top:2rem;">Quiz History</h2>
    <div class="table-wrap">
      <table class="data-table" id="quizHistoryTable">
        <thead>
          <tr>
            <th>#</th>
            <th>Date</th>
            <th>Score</th>
            <th>Percentage</th>
            <th>Grade</th>
            <th>Result</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>

    <button class="btn btn-danger btn-sm" style="margin-top:1rem;" id="clearDataBtn">
      <i class="bi bi-trash"></i> Clear All Data
    </button>
  </main>

  <footer class="site-footer">
    <p>&copy; 2025 LearnHub E-Learning Platform. All rights reserved.</p>
  </footer>

  <script src="js/data.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      initNav("profile");

      
      const profile = Storage.getProfile();
      document.getElementById("profileCard").innerHTML = `
        <div class="profile-avatar">${profile.name.charAt(0)}</div>
        <div class="profile-info">
          <h2>${profile.name}</h2>
          <p><i class="bi bi-envelope"></i> ${profile.email}</p>
          <p><i class="bi bi-calendar3"></i> Joined: ${profile.joined}</p>
          <span class="badge badge-learner">${profile.role}</span>
        </div>`;

      
      const list = document.getElementById("completedList");
      const progress = Storage.getProgress();
      courses.forEach(c => {
        const done = progress[c.id] || 0;
        const pct = Math.round((done / c.totalLessons) * 100);
        const isComplete = done >= c.totalLessons;
        const li = document.createElement("li");
        li.innerHTML = `
          <div>
            <strong>${c.title}</strong>
            <div style="font-size:0.82rem;color:var(--gray);">${done}/${c.totalLessons} lessons</div>
            <progress value="${done}" max="${c.totalLessons}" style="width:150px;margin-top:0.3rem;"></progress>
          </div>
          <span class="check">${isComplete ? '<i class="bi bi-check-circle-fill"></i> Done' : pct + '%'}</span>`;
        list.appendChild(li);
      });

      
      const results = Storage.getQuizResults();
      const tbody = document.querySelector("#quizHistoryTable tbody");
      if (results.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:var(--gray);">No quizzes taken yet.</td></tr>';
      } else {
        results.forEach((r, i) => {
          const tr = document.createElement("tr");
          tr.innerHTML = `
            <td>${i + 1}</td>
            <td>${new Date(r.date).toLocaleDateString()}</td>
            <td>${r.score}/${r.total}</td>
            <td>${r.percentage}%</td>
            <td><strong>${r.grade}</strong></td>
            <td><span class="badge ${r.passed ? 'bg-success' : 'bg-danger'}">${r.passed ? 'Pass' : 'Fail'}</span></td>`;
          tbody.appendChild(tr);
        });
      }

      
      document.getElementById("clearDataBtn").addEventListener("click", () => {
        if (confirm("Clear all progress and quiz data?")) {
          localStorage.clear();
          location.reload();
        }
      });
    });
  </script>
</body>
</html>
